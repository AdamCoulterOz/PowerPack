name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Derive Version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ -z "${version}" || "${version}" == "${GITHUB_REF_NAME}" ]]; then
            echo "Expected a tag like v1.2.3." >&2
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "api_package_uri=https://github.com/${{ github.repository }}/releases/download/v${version}/released-package.zip" >> "${GITHUB_OUTPUT}"

      - name: Restore
        run: dotnet restore ./source/PowerPack.slnx

      - name: Test
        run: dotnet test ./source/PowerPack.slnx --configuration Release --no-restore

      - name: Validate Terraform Module
        run: |
          terraform -chdir=./infra init -backend=false
          terraform -chdir=./infra validate

      - name: Pack CLI
        run: |
          dotnet pack ./source/CLI/CLI.csproj \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.value }} \
            --output ./artifacts/cli

      - name: Publish API
        run: |
          dotnet publish ./source/API/API.csproj \
            --configuration Release \
            --no-restore \
            --output ./artifacts/api/publish

      - name: Archive API Package
        run: |
          cd ./artifacts/api/publish
          zip -r ../released-package.zip .

      - name: Package Terraform Module
        run: |
          mkdir -p ./artifacts/module/package
          cp ./infra/*.tf ./artifacts/module/package/
          sed -i.bak 's|baked_api_package_uri = null|baked_api_package_uri = "${{ steps.version.outputs.api_package_uri }}"|' ./artifacts/module/package/release_package.tf
          rm ./artifacts/module/package/release_package.tf.bak
          cd ./artifacts/module/package
          zip -r ../module-${{ steps.version.outputs.value }}.zip .

      - name: Publish CLI Package To GitHub Packages
        run: |
          dotnet nuget push ./artifacts/cli/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ github.token }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/cli/*.nupkg
            ./artifacts/api/released-package.zip
            ./artifacts/module/module-${{ steps.version.outputs.value }}.zip
